postConfirmUser:
  handler: src/userFunction/profileService.handleInitUser
  events:
    - cognitoUserPool:
        pool: ${env:USER_POOL_NAME}
        trigger: PostConfirmation
        existing: true
        
updateProfile:
  handler: src/userFunction/profileService.handleUpdateProfile
  events:
    - httpApi:
        path: /update-profile
        method: put
        authorizer:
          name: myCognitoAuth

presignAvatar:
  handler: src/userFunction/avatarService.handlePresignAvatar
  events:
    - httpApi:
        path: /avatar/presign
        method: post
        authorizer:
          name: myCognitoAuth

confirmAvatar:
  handler: src/userFunction/avatarService.handleConfirmAvatar
  events:
    - httpApi:
        path: /avatar/confirm
        method: post
        authorizer:
          name: myCognitoAuth

equipCosmetics:
  handler: src/userFunction/profileService.handleEquipCosmetics
  events:
    - httpApi:
        path: /change-cosmetics
        method: post
        authorizer:
          name: myCognitoAuth

