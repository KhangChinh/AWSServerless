postConfirmUser:
  handler: src/userFunction/profileService.handleInitUser
  events:
    - cognitoUserPool:
        pool: ${env:USER_POOL_NAME}
        trigger: PostConfirmation
        existing: true
        
updateProfile:
  handler: src/userFunction/profileService.handleUpdateProfile
  events:
    - httpApi:
        path: /update-profile
        method: put
        authorizer:
          name: myCognitoAuth

equipCosmetics:
  handler: src/userFunction/profileService.handleEquipCosmetics
  events:
    - httpApi:
        path: /change-cosmetics
        method: post
        authorizer:
          name: myCognitoAuth

updateAvatar:
  handler: src/userFunction/profileService.handleUploadAvatar
  events:
    - httpApi:
        path: /update-avatar
        method: post
        authorizer:
          name: myCognitoAuth