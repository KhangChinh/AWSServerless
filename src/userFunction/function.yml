getUser:
  handler: src/userFunction/userService.handleGetUser
  events:
    - httpApi:
        path: /get-user
        method: get
        authorizer:
          name: myCognitoAuth

postConfirmUser:
  handler: src/userFunction/userService.handleInitUser
  events:
    - cognitoUserPool:
        pool: User pool - diktu
        trigger: PostConfirmation
        existing: true

getProfile:
  handler: src/userFunction/userService.handleGetProfile
  events:
    - httpApi:
        path: /get-profile
        method: get
        authorizer:
          name: myCognitoAuth

updateProfile:
  handler: src/userFunction/userService.handleUpdateProfile
  events:
    - httpApi:
        path: /update-profile
        method: put
        authorizer:
          name: myCognitoAuth

equipCosmetics:
  handler: src/userFunction/userService.handleEquipCosmetics
  events:
    - httpApi:
        path: /change-cosmetics
        method: put
        authorizer:
          name: myCognitoAuth