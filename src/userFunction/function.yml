postConfirmUser:
  handler: src/userFunction/profileService.handleInitUser
  events:
    - cognitoUserPool:
        pool: User pool - diktu
        trigger: PostConfirmation
        existing: true

getProfile:
  handler: src/userFunction/profileService.handleGetProfile
  events:
    - httpApi:
        path: /get-profile
        method: get
        authorizer:
          name: myCognitoAuth

updateProfile:
  handler: src/userFunction/profileService.handleUpdateProfile
  events:
    - httpApi:
        path: /update-profile
        method: put
        authorizer:
          name: myCognitoAuth

equipCosmetics:
  handler: src/userFunction/profileService.handleEquipCosmetics
  events:
    - httpApi:
        path: /change-cosmetics
        method: put
        authorizer:
          name: myCognitoAuth

presignAvatar:
  handler: src/userFunction/avatarService.handlePresignAvatar
  events:
    - httpApi:
        path: /avatar/presign
        method: post
        authorizer:
          name: myCognitoAuth

confirmAvatar:
  handler: src/userFunction/avatarService.handleConfirmAvatar
  events:
    - httpApi:
        path: /avatar/confirm
        method: post
        authorizer:
          name: myCognitoAuth