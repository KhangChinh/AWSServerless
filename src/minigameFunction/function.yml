getSudokuLevels:
  handler: src/minigameFunction/minigameService.handleGetSudokuLevels
  events:
    - httpApi:
        path: /minigame/sudokulevels
        method: get
        authorizer:
          name: myCognitoAuth

startGameSession:
  handler: src/minigameFunction/minigameService.handleStartSession
  events:
    - httpApi:
        path: /minigame/sudokulevels/start-game
        method: post
        authorizer:
          name: myCognitoAuth

checkSudokuBoard:
  handler: src/minigameFunction/minigameService.handleCheckSudokuBoard
  events:
    - httpApi:
        path: /minigame/sudokulevels/check
        method: post
        authorizer:
          name: myCognitoAuth

endSudokuSession:
  handler: src/minigameFunction/minigameService.handleEndSudokuSession
  events:
    - httpApi:
        path: /minigame/sudokulevels/end-session
        method: post
        authorizer:
          name: myCognitoAuth

getGlobalLeaderboard:
  handler: src/minigameFunction/minigameService.handleGetGlobalLeaderboard
  events:
    - httpApi:
        path: /minigame/leaderboard/global
        method: get
        authorizer:
          name: myCognitoAuth

getFriendsLeaderboard:
  handler: src/minigameFunction/minigameService.handleGetFriendsLeaderboard
  events:
    - httpApi:
        path: /minigame/leaderboard/friends
        method: get
        authorizer:
          name: myCognitoAuth

leaderboardWorker:
  handler: src/minigameFunction/minigameService.handleLeaderboardWorker
  events:
    - schedule:
        description: Trigger update leaderboard moi 10 phut
        rate: rate(10 minutes)