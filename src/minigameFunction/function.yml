getSudokuLevels:
  handler: src/minigameFunction/minigameService.handleGetSudokuLevels
  events:
    - httpApi:
        path: /minigame/sudokulevels
        method: get
        authorizer:
          name: myCognitoAuth
getMinesweeperLevels:
  handler: src/minigameFunction/minesweeperService.handleGetMinesweeperLevels
  events:
    - httpApi:
        path: /minigame/minesweeperlevels
        method: get
        authorizer:
          name: myCognitoAuth
startGameSudokuSession:
  handler: src/minigameFunction/minigameService.handleStartSudokuSession
  events:
    - httpApi:
        path: /minigame/sudokulevels/start-game
        method: post
        authorizer:
          name: myCognitoAuth
startGameMinesweeperSession:
  handler: src/minigameFunction/minesweeperService.handleStartMinesweeperSession
  events:
    - httpApi:
        path: /minigame/minesweeperlevels/start-game
        method: post
        authorizer:
          name: myCognitoAuth
revealMinesweeperCell:
  handler: src/minigameFunction/minesweeperService.handleReveal
  events:
    - httpApi:
        path: /minigame/minesweeper/reveal
        method: post
        authorizer:
          name: myCognitoAuth
checkSudokuBoard:
