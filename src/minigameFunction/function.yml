  handler: src/minigameFunction/minigameService.handleGetLeaderboard
  events:
    - httpApi:
        path: /minigame/leaderboard
        method: get
        authorizer:
          name: myCognitoAuth
leaderboardMinesweeperWorker:
  handler: src/minigameFunction/minesweeperService.handleLeaderboardMinesweeperWorker
  events:
    - schedule:
        description: Trigger update leaderboard Minesweeper moi 10 phut
        rate: rate(10 minutes)
