getSudokuLevels:
  handler: src/minigameFunction/minigameService.handleGetSudokuLevels
  events:
    - httpApi:
        path: /minigame/sudokulevels
        method: get
        authorizer:
          name: myCognitoAuth

startGameSession:
  handler: src/minigameFunction/minigameService.handleStartSession
  events:
    - httpApi:
        path: /minigame/sudokulevels/start-game
        method: post
        authorizer:
          name: myCognitoAuth

endMinigame:
  handler: src/minigameFunction/minigameService.handleEndGame
  events:
    - httpApi:
        path: /minigame/end
        method: post
        authorizer:
          name: myCognitoAuth

getGlobalLeaderboard:
  handler: src/minigameFunction/minigameService.handleGetGlobalLeaderboard
  events:
    - httpApi:
        path: /minigame/leaderboard/global
        method: get
        authorizer:
          name: myCognitoAuth

getFriendsLeaderboard:
  handler: src/minigameFunction/minigameService.handleGetFriendsLeaderboard
  events:
    - httpApi:
        path: /minigame/leaderboard/friends
        method: get
        authorizer:
          name: myCognitoAuth

leaderboardWorker:
  handler: src/minigameFunction/minigameService.handleLeaderboardWorker
  events:
    - schedule:
        rate: rate(10 minutes)
        enabled: true
