gacha:
  handler: src/gachaFunction/gachaService.handleGacha
  events:
    - httpApi:
        path: /gacha
        method: post
        authorizer:
          name: myCognitoAuth

refreshGachaBanners:
  handler: src/gachaFunction/refreshBannerService.handleRefreshBanners
  events:
    - schedule: 
        description: Quét và làm mới các banner Gacha hết hạn mỗi nửa ngày
        rate: rate(12 hours)