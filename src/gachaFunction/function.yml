gacha:
  handler: src/gachaFunction/gachaService.handleGacha
  events:
    - httpApi:
        path: /gacha
        method: post
        authorizer:
          name: myCognitoAuth

getGachaBanners:
  handler: src/gachaFunction/gachaService.handleGetGachaBanners
  events:
    - httpApi:
        path: /gacha/banners
        method: get
        authorizer:
          name: myCognitoAuth

refreshGachaBanners:
  handler: src/gachaFunction/refreshBannerService.handleRefreshBanners
  events:
    - schedule: 
        description: Quét và làm mới các banner Gacha hết hạn mỗi đêm
        rate: cron(0 17 * * ? *)
